# ----- Global ---------------------------------------------------------------
# Two-line prompt like p10k: info on line 1, prompt char on line 2.
add_newline = true
command_timeout = 1200
scan_timeout = 50
# Use a palette so we can tweak colors once.
palette = "p10kish"

# Left prompt (line 1), then newline + prompt char (line 2).
format = """
$os$container$hostname$username\
$directory\
$git_branch$git_status\
$kubernetes$docker_context\
$python$conda$nodejs$rust$golang$java$dotnet\
$aws$gcloud$terraform$nix_shell$package\
$line_break\
$character"""

# Right prompt (line 1 right side): clock, long-running cmd duration, background jobs, battery if low.
right_format = "$jobs$cmd_duration$time$battery"

# Compact continuation for wrapped commands.
continuation_prompt = "  вҖҰ "

# ----- Styles / Palette -----------------------------------------------------
[palettes.p10kish]
fg = "white"
dim = "bright-black"
accent = "cyan"
ok = "green"
warn = "yellow"
err = "red"
violet = "purple"
blue = "blue"
hint = "bright-black"

# ----- Prompt Character & Modes --------------------------------------------
[character]
success_symbol = "[вқҜ](bold ok)"
error_symbol   = "[вқҜ](bold err)"
vicmd_symbol   = "[вқ®](bold accent)"
format = "$symbol "

# Show a subtle marker if youвҖҷre root or via sudo.
[status]
style = "bold err"
symbol = "вңҳ "
success_symbol = ""
format = "[$symbol$status]($style) "
map_symbol = true
disabled = false

[sudo]
style = "bold warn"
symbol = "вҡЎ "
disabled = false
format = "[$symbol]($style) "

[jobs]
symbol = "вңҰ "
style = "bold accent"
threshold = 1
format = "[$symbol$number]($style) "

# ----- Time & Duration ------------------------------------------------------
[cmd_duration]
min_time = 2000
format = "took [$duration]($style) "
style = "dim"

[time]
disabled = false
time_format = "%H:%M"
format = "[$time]($style) "
style = "dim"

[battery]
disabled = false
full_symbol = "пүҖ "
charging_symbol = "пҮҰ "
discharging_symbol = "пүӮ "
unknown_symbol = "пү„ "
format = "[$symbol$percentage]($style) "
[[battery.display]]
threshold = 25
style = "bold warn"

# ----- Identity & Context ---------------------------------------------------
[os]
disabled = false
format = "[$symbol]($style) "
style = "dim"
# Feel free to trim this to the OSes you use.
[os.symbols]
Macos = "п…№ "
Linux = "п…ј "
Windows = "п…ә "

[username]
style_user = "bold fg"
style_root = "bold err"
format = "[$user]($style)"
show_always = false

[hostname]
ssh_only = true
format = "[@$hostname]($style) "
style = "dim"

[container]
format = "[$symbol $name]($style) "
symbol = "рҹҚұ"
style = "dim"
disabled = false

# ----- Location -------------------------------------------------------------
[directory]
style = "bold accent"
truncation_length = 3
truncate_to_repo = true
read_only = "пҖЈ"
read_only_style = "dim"
fish_style_pwd_dir_length = 1
format = "[$path]($style)[$read_only]($read_only_style) "

# ----- Git ------------------------------------------------------------------
[git_branch]
symbol = "пҗҳ "
style = "bold violet"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold err"
format = "([$all_status$ahead_behind]($style) )"
# Tweak symbols to be compact but expressive.
conflicted = "вҡ "
ahead = "вҮЎ${count}"
behind = "вҮЈ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
stashed = "вңӯ"
staged = "+${count}"
modified = "~${count}"
renamed = "В»${count}"
deleted = "вң—${count}"
untracked = "?${count}"

# ----- Runtimes / Toolchains -----------------------------------------------
[python]
symbol = "оҳҶ "
style = "bold blue"
# Show venv/pyenv + version when relevant; quiet otherwise.
format = 'via [${symbol}${pyenv_prefix}${version} (${virtualenv})]($style) '
pyenv_version_name = true
detect_extensions = ["py", "ipynb"]
detect_files = ["pyproject.toml", "requirements.txt", ".python-version", "Pipfile", "poetry.lock"]
python_binary = "python3"

[conda]
symbol = "рҹ§Ә "
style = "bold blue"
format = "via [$symbol$environment]($style) "

[nodejs]
symbol = "оңҳ "
style = "bold green"
format = "via [$symbol$version]($style) "
detect_files = ["package.json", "pnpm-lock.yaml", "yarn.lock", "bun.lockb"]

[rust]
symbol = "оһЁ "
style = "bold red"
format = "via [$symbol$version]($style) "

[golang]
symbol = "оҳ§ "
style = "bold cyan"
format = "via [$symbol$version]($style) "

[java]
symbol = "оү– "
style = "bold red"
format = "via [$symbol$version]($style) "

[dotnet]
symbol = ".NET "
style = "bold purple"
format = "via [$symbol($version)]($style) "

[package]
symbol = "у°Ҹ— "
style = "dim"
format = "is [$symbol$version]($style) "
display_private = true

# ----- Cloud / DevOps -------------------------------------------------------
[aws]
symbol = "оҢҪ "
style = "bold warn"
format = "with [$symbol($profile)(@$region)]($style) "
expiration_symbol = "вҸі"

[gcloud]
symbol = "уұҮ¶ "
style = "bold warn"
format = "with [$symbol$account(@$region)]($style) "

[kubernetes]
symbol = "вҳё "
format = "[$symbol$context(::$namespace)](bold blue) "
disabled = false
detect_files = ["kubernetes.yaml", "k8s.yaml", "helmfile.yaml", "Chart.yaml"]
# Optional: shorten noisy managed contexts.
contexts = [
  { context_pattern = "gke_.*_(?P<cluster>[\\w-]+)", context_alias = "gke:$cluster" },
  { context_pattern = "arn:aws:eks:.*:cluster/(?P<cluster>[\\w-]+)", context_alias = "eks:$cluster" }
]

[docker_context]
symbol = "пҢҲ "
style = "bold cyan"
format = "via [$symbol$context]($style) "

[terraform]
symbol = "уұҒў "
style = "bold violet"
format = "via [$symbol$workspace]($style) "

[nix_shell]
symbol = "пҢ“ "
style = "bold blue"
format = "via [$symbol$state( $name)]($style) "

# ----- Misc / Nice-to-haves -------------------------------------------------
[cmd_guard]  # (custom idea placeholder; starship ignores unknown tables)
# This is just a comment hint: consider adding a shell alias guard or safe-rm.

# Show the active shell only when itвҖҷs not your default.
[shell]
disabled = true

# Keep prompt tight on empty envs.
[env_var]
# Example: surface a PROJECT env var if set.
variable = "PROJECT"
format = "[$env_value]($style) "
style = "bold accent"
disabled = true
