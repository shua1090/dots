# ~/.config/starship.toml
scan_timeout = 20
command_timeout = 300
add_newline = false

# Left side: Critical context
format = """
$os\
$directory\
$git_branch\
$git_status\
$git_metrics\
$git_state\
$fill\
$rust\
$python\
$nodejs\
$line_break\
$character"""

# Right side: System/Meta info
right_format = """$cmd_duration$battery$time"""

[fill]
symbol = ' '

[character]
success_symbol = '[¾░äŠ](bold green)'
error_symbol = '[¾░äŠ](bold red)'
vicmd_symbol = '[¾░äĮ](bold purple)'

[directory]
style = 'bold cyan'
truncation_length = 3
truncate_to_repo = true
read_only = ' ¾░īŠ'

[git_branch]
symbol = '’Éś '
style = 'bold purple'
format = 'on [$symbol$branch]($style) '

[git_status]
style = 'bold red'
# Use literal single quotes here to avoid TOML escape errors
format = '([\[$all_status$ahead_behind\]]($style) )'
stashed = 'ŌēĪ'
modified = '!'
untracked = '?'
deleted = 'Ō£ś'

[rust]
symbol = 'Ņ×© '
style = 'bold #e44d26'
format = 'via [$symbol($version )]($style)'

[python]
symbol = 'Ņśå '
style = 'bold yellow'
format = 'via [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

[battery]
full_symbol = '¾░ü╣ '
charging_symbol = '¾░éä '
discharging_symbol = '¾░éā '
[[battery.display]]
threshold = 30
style = 'bold red'

[cmd_duration]
min_time = 500
format = 'took [¾▒Ä½ $duration]($style) '
style = 'bold yellow'

[time]
disabled = false
time_format = '%R'
style = 'bold #595959'
format = 'at [$time]($style)'

[os]
disabled = false
style = 'bold white'

[os.symbols]
Macos = '¾░ĆĄ '
Fedora = '’īŖ '
Linux = '¾░īĮ '

[git_metrics]
added_style = "bold green"
deleted_style = "bold red"
format = '[+$added]($added_style)/[-$deleted]($deleted_style) '
disabled = false
