# Starship Prompt вЂ” hacker-dark-but-cheery v3 (flashier)
# Drop at: ~/.config/starship.toml
"$schema" = "https://starship.rs/config-schema.json"

# ----------------------------------------------------------------------------
# Layout: colorful powerline on LEFT, compact INFO banner on RIGHT
# ----------------------------------------------------------------------------
format = "[о‚¶](fg:surface2)$os$username$hostname$directory$git_branch$git_status$python$nodejs$rust$golang$java$docker_context$kubernetes$terraform$nix_shell$package$line_break$character"
right_format = """$all"""
#right_format = "[о‚¶](fg:surface2)$info_banner[о‚ґ](fg:surface2)"
add_newline = true
palette = "user_dark"

# Compose a flashy right-side info banner using time/status/jobs/memory
# We emulate a mini powerline bar by giving each module a bg and chaining them.
[custom.info_banner]
description = "Right-side info banner"
when = "true"
command = "echo"
format = "[ ](bg:surface2)"

# --- Right-side modules used in $info_banner ---------------------------------
[time]
disabled = false
use_12hr = false
format = "[о‚¶](fg:mantle)[ пђє $time ](fg:text bg:mantle)[о‚°](fg:mantle bg:surface1)"
style = "fg:text bg:mantle"
time_format = "%H:%M:%S"

[cmd_duration]
min_time = 250
format = "[ вЏ± $duration ](fg:subtext0 bg:surface1)[о‚°](fg:surface1 bg:surface0)"
show_milliseconds = true

[status]
disabled = false
symbol = "вњ–"
format = "[ $symbol $status ](bold fg:red bg:surface0)[о‚°](fg:surface0 bg:base)"
map_symbol = true

[memory_usage]
disabled = false
threshold = -1
format = "[ ої… $ram( | $swap) ](fg:sky bg:base)"

# ----------------------------------------------------------------------------
# Core prompt parts (LEFT)
# ----------------------------------------------------------------------------
[character]
success_symbol = "[вќЇ](bold fg:teal)"
error_symbol   = "[вќЇ](bold fg:red)"
vimcmd_symbol  = "[вќ®](bold fg:green)"
format = "$symbol "

[os]
disabled = false
style = "fg:crust bg:surface2"
format = "[ пЊѓ ]($style)[о‚°](fg:surface2 bg:surface1)"

[username]
show_always = true
format = "[ $user ](fg:crust bg:surface1)[о‚°](fg:surface1 bg:surface0)"
style_user = "fg:crust bg:surface1"
style_root = "fg:crust bg:red"

[hostname]
ssh_only = false
format = "[ $hostname ](fg:text bg:surface0)[о‚°](fg:surface0 bg:base)"

[directory]
style = "bold fg:text bg:base"
format = "[ пЃј $path ]($style)"
truncation_length = 3
truncation_symbol = "вЂ¦/"
truncate_to_repo = true
read_only = " у°Њѕ"
read_only_style = "fg:yellow"

# --- Git (more verbose & human-readable) -------------------------------------
[git_branch]
# Powerline branch glyph for wide NF coverage.
symbol = "о‚ "
format = "[о‚°](fg:base bg:surface2)[ $symbol $branch ](fg:text bg:surface2)"
only_attached = false

[git_status]
# Replace cryptic icons with labeled counters
# Example output: "+2 staged ~1 mod ?3 untracked в†‘1 в†“0"
format = "[ $staged$modified$renamed$deleted$untracked$stashed$conflicted$ahead_behind ](fg:sapphire bg:surface2)[о‚°](fg:surface2)"
style = "fg:sapphire bg:surface2"
# Per-counter strings (with labels)
conflicted = "conflict:${count} "
ahead = "в†‘${count} "
behind = "в†“${count} "
diverged = "в†‘${ahead_count}в†“${behind_count} "
untracked = "?${count} untracked "
stashed = "stash:${count} "
modified = "~${count} mod "
staged = "+${count} staged "
renamed = "> ${count} ren "
deleted = "вњ–${count} del "

# --- Runtimes -----------------------------------------------------------------
[python]
format = "[о‚¶](fg:mantle)[ venv:$virtualenv( $version) ](fg:crust bg:mantle)[о‚°](fg:mantle)"
version_format = "v${major}.${minor}.${patch}"
python_binary = ["python", "python3"]

[nodejs]
format = "[ node $version ](fg:green)"

[rust]
format = "[ rs $version ](fg:peach)"

[golang]
format = "[ go $version ](fg:sky)"

[java]
format = "[ java $version ](fg:mauve)"

[docker_context]
format = "[ docker $context ](fg:blue)"
only_with_files = true

[kubernetes]
disabled = false
format = "[ k8s $context(::$namespace) ](fg:teal)"

[terraform]
format = "[ tf $version ](fg:lavender)"

[nix_shell]
format = "[ nix $state( $name) ](fg:sapphire)"

[package]
format = "[ pkg $version ](fg:yellow)"
display_private = true

[direnv]
format = "[ direnv ](fg:overlay1)"

[aws]
format = "[ aws $profile ](fg:overlay1)"

[gcloud]
format = "[ gcp $account ](fg:overlay1)"

[jobs]
format = "[вљ™ $number](fg:peach)"

[shell]
disabled = false
fish_indicator = "fish"
bash_indicator = "bash"
zsh_indicator  = "zsh"
format = "[$indicator](fg:overlay2) "

[battery]
disabled = true

# --- Palette (Catppuccin Mocha-ish) ------------------------------------------
[palettes.user_dark]
rosewater = "#f4dbd6"
flamingo  = "#f0c6c6"
pink      = "#f5bde6"
mauve     = "#c6a0f6"
red       = "#ed8796"
maroon    = "#ee99a0"
peach     = "#f5a97f"
