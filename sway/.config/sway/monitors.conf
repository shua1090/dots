# --- Monitor Variables ---
# Define variables for your displays to make the config cleaner.
set $laptop_monitor eDP-1
set $external_monitor HDMI-A-1


# --- Default Monitor Layout at Startup ---
# This configures your monitors in an extended layout when Sway first starts.
# Your laptop is high-DPI (scale 2), external is standard (scale 1).
# The external monitor starts where the *logical* width of the laptop ends (3840px / 2 = 1920px).
output $laptop_monitor enable scale 2 resolution 3840x2400 position 0 0
output $external_monitor enable scale 1 resolution 3440x1440@99.999Hz position 1920 0


# --- Keybinds to Switch Monitor Layouts ---
# You can change "$mod+e", etc. to whatever key combination you prefer.

# $mod+e  -> Activates EXTENDED layout (your default)
bindsym $mod+Ctrl+d exec swaymsg "output $laptop_monitor enable scale 2 resolution 3840x2400 position 0 0; \
                                output $external_monitor enable scale 1 resolution 3440x1440@99.999Hz position 1920 0"

# $mod+Shift+e -> Activates MIRRORED layout
# Both screens are set to a common resolution (1920x1080) and positioned at 0 0 to overlap.
bindsym $mod+Shift+d exec swaymsg "output $laptop_monitor enable scale 1 resolution 1920x1080 position 0 0; \
                                      output $external_monitor enable scale 1 resolution 1920x1080 position 0 0"

# $mod+Control+e -> Activates EXTERNAL MONITOR ONLY layout (Laptop screen off)
# bindsym $mod+Control+e exec swaymsg "output $laptop_monitor disable; \
#                                       output $external_monitor enable scale 1 resolution 3440x1440@99.999Hz position 0 0"
