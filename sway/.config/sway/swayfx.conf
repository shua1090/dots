# Include this file from your main config:
#   include ~/.config/sway/swayfx.conf

### SwayFX niceties (subtle, minimalist rice) ###

# --- Corners & shadows ---
corner_radius 10
titlebar_separator disable
shadows enable
shadows_on_csd enable
shadow_blur_radius 30
shadow_offset 0 6
shadow_color #000000AA
shadow_inactive_color #00000066

# --- Opacity / dim ---
# Note: opacity values are 0.0..1.0; 0.9 ≈ 10% transparent.
# If you truly want ~90% transparent (i.e., barely visible), set 0.1.
set $opacity_active 0.90
set $opacity_inactive 0.85
for_window [app_id=".*"] opacity $opacity_active
for_window [app_id=".*"] dim_inactive 0.15

# --- Blur ---
blur enable
blur_xray disable
blur_passes 3
blur_radius 7
blur_noise 0.03
blur_brightness 1.0
blur_contrast 1.0
blur_saturation 1.0

# --- Layer effects (Waybar, GTK layer-shell, notifications) ---
# Tweak these if your bar/notifications get too blurred
layer_effects "waybar" {
    blur enable;
    corner_radius 10;
}
layer_effects "gtk-layer-shell" {
    blur enable;
    corner_radius 10;
}
# Example for swaync (if used):
# layer_effects "swaync-control-center" { blur enable; corner_radius 10; }
# layer_effects "swaync-notification-window" { blur enable; corner_radius 10; }

# --- Optional: make scratchpad behave like minimize ---
# (can be quirky with some docks/panels)
# scratchpad_minimize enable
