# /etc/greetd/config.toml

[terminal]
vt = 1

# If you want an autologin or pre-login compositor, you'd use [initial_session] too.
# For now we keep it simple: just a greeter.

[default_session]
user = "greeter"
command = "tuigreet --time --time-format '%a %b %d · %H:%M' --greeting 'Welcome' --remember --remember-user-session --user-menu --user-menu-min-uid 1000 --width 90 --window-padding 2 --container-padding 1 --prompt-padding 1 --greet-align center --theme 'border=gray;text=lightgray;prompt=lightblue;time=cyan;action=cyan;button=gray;container=black;input=lightcyan' --cmd sway"

